<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ブラックサンダーガチャ</title>

<style>

body{
text-align:center;
font-family:sans-serif;
margin-top:120px;
background:#fff8e1;
overflow:hidden;
}

#result{
margin-top:50px;
font-size:40px;
}

.snack{
position:fixed;
top:-50px;
font-size:40px;
animation:fall 2s linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

</style>

</head>

<body>

<h1>⚡ ブラックサンダーガチャ ⚡</h1>

<div id="result">お菓子が落ちてきます…</div>

<script>

const snacks=[
"⚡ブラックサンダー！！",
"🍪 その他のお菓子！"
]

// 落ちてくるアニメーション
for(let i=0;i<15;i++){

const s=document.createElement("div")
s.className="snack"
s.innerText="🍫"

s.style.left=Math.random()*100+"vw"
s.style.animationDelay=Math.random()*1+"s"

document.body.appendChild(s)

}

// 2秒後に結果
setTimeout(()=>{

const r=Math.random()

let result

if(r<0.5){
result="⚡ブラックサンダー！！"
}else{
result="🍪 その他のお菓子！"
}

document.getElementById("result").innerHTML=
result+"<br><br>ご自由にお食べください 😋"

},2000)

</script>

</body>
</html>
