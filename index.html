<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BLACK THUNDER GACHA</title>

<style>

body{
margin:0;
text-align:center;
font-family:sans-serif;
background:black;
color:white;
overflow:hidden;
}

h1{
margin-top:120px;
font-size:48px;
}

#result{
margin-top:40px;
font-size:60px;
font-weight:bold;
opacity:0;
transition:1s;
}

.choco{
position:fixed;
top:-50px;
font-size:40px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(120vh) rotate(360deg);
}
}

.flash{
position:fixed;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
}

</style>
</head>

<body>

<h1>⚡ ブラックサンダーガチャ ⚡</h1>

<div id="result"></div>

<div class="flash" id="flash"></div>

<script>

function lightning(){

const flash=document.getElementById("flash")

flash.style.opacity=1

setTimeout(()=>{
flash.style.opacity=0
},120)

}

function dropChocolate(){

for(let i=0;i<100;i++){

const c=document.createElement("div")

c.className="choco"
c.innerText="🍫"

c.style.left=Math.random()*100+"vw"
c.style.animationDuration=(2+Math.random()*2)+"s"
c.style.animationDelay=Math.random()*1+"s"

document.body.appendChild(c)

}

}

setTimeout(()=>{
lightning()
},500)

setTimeout(()=>{
dropChocolate()
},800)

setTimeout(()=>{

const r=Math.random()

let result

if(r<0.5){
result="⚡ 超大当たり ⚡<br>ブラックサンダー！"
}else{
result="🍪 当たり<br>その他のお菓子！"
}

document.getElementById("result").innerHTML =
result + "<br><br>ご自由にどうぞ 😋"

document.getElementById("result").style.opacity=1

},3500)

</script>

</body>
</html>
