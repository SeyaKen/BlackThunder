<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ブラックサンダーガチャ</title>

<style>

body{
text-align:center;
font-family:sans-serif;
background:#fff3cd;
overflow:hidden;
}

h1{
margin-top:80px;
font-size:40px;
}

#result{
margin-top:40px;
font-size:42px;
font-weight:bold;
}

.thunder{
position:fixed;
top:-120px;
width:80px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(120vh) rotate(360deg);
}
}

</style>

</head>

<body>

<h1>⚡ブラックサンダーガチャ⚡</h1>
<div id="result">ブラックサンダーが降ってきます…</div>

<script>

const thunderImg="https://upload.wikimedia.org/wikipedia/commons/5/5a/Black_Thunder_chocolate_bar.jpg"

// 大量に降らせる
for(let i=0;i<30;i++){

const img=document.createElement("img")

img.src=thunderImg
img.className="thunder"

img.style.left=Math.random()*100+"vw"

img.style.animationDuration=(2+Math.random()*2)+"s"

img.style.animationDelay=Math.random()*1+"s"

document.body.appendChild(img)

}

// 結果
setTimeout(()=>{

const r=Math.random()

let result

if(r<0.6){
result="⚡超大当たり⚡<br>ブラックサンダー！"
}else{
result="🍪当たり<br>その他のお菓子！"
}

document.getElementById("result").innerHTML=
result+"<br><br>ご自由にどうぞ 😋"

},2500)

</script>

</body>
</html>
