<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ブラックサンダーガチャ</title>

<style>

body{
text-align:center;
font-family:sans-serif;
background:linear-gradient(#fff3cd,#ffe082);
overflow:hidden;
margin:0;
}

h1{
margin-top:80px;
font-size:42px;
}

#result{
margin-top:50px;
font-size:44px;
font-weight:bold;
}

.thunder{
position:fixed;
top:-50px;
font-size:40px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(120vh) rotate(360deg);
}
}

</style>

</head>

<body>

<h1>⚡ブラックサンダーガチャ⚡</h1>
<div id="result">ブラックサンダーが降ってきます…</div>

<script>

// ブラックサンダー風チョコを大量生成
for(let i=0;i<60;i++){

const s=document.createElement("div")

s.className="thunder"
s.innerText="🍫"

s.style.left=Math.random()*100+"vw"
s.style.animationDuration=(2+Math.random()*2)+"s"
s.style.animationDelay=Math.random()*1+"s"

document.body.appendChild(s)

}

// 結果表示
setTimeout(()=>{

const r=Math.random()

let result

if(r<0.65){
result="⚡超大当たり⚡<br>ブラックサンダー！"
}else{
result="🍪当たり<br>その他のお菓子！"
}

document.getElementById("result").innerHTML=
result+"<br><br>ご自由にどうぞ 😋"

},2500)

</script>

</body>
</html>
